  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar" aria-label="Painel cultural">
      <header class="brand">
        <p class="eyebrow">Cartografias da língua portuguesa</p>
        <h1>Atlas Cultural da Lusofonia</h1>
      </header>

      <section class="search-panel" aria-label="Busca">
        <label for="searchInput">Buscar país, literatura, música ou mídia</label>
        <input id="searchInput" type="search" placeholder="Ex.: Mia Couto, Brasil, Público">
        <div id="searchResults" class="search-results" aria-live="polite"></div>
      </section>

      <nav class="country-list" aria-label="Países lusófonos">
        <h2>Países</h2>
        <div id="countryList"></div>
      </nav>

      <section id="details" class="details-panel" aria-live="polite">
        <p class="intro-text">
          Clique em um país lusófono no mapa para explorar literatura, música e mídia cultural.
        </p>
      </section>
    </aside>

    <section class="map-area" aria-label="Mapa-múndi interativo">
      <div class="map-toolbar">
        <span>Mapa cultural interativo</span>
        <button id="resetMap" type="button">Ver todos</button>
      </div>
      <div id="map"></div>
    </section>
  </main>

  <div id="contentModal" class="modal-backdrop" hidden>
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeModal" class="modal-close" type="button" aria-label="Fechar janela">×</button>
      <div id="modalBody"></div>
    </article>
  </div>
